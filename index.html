<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C💖B Date Grabbelton</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

  <header>
    <h1>C<span class="heart">💖</span>B</h1>
    <p class="subtitle">Date grabbelton</p>
  </header>

  <!-- RANDOM -->
  <div class="card" id="randomSection">
    <div class="card-header">
      <span class="card-icon">🎲</span>
      <h2>Verras me</h2>
    </div>

    <div class="random-options">
      <label class="toggle-pill">
        <input type="checkbox" id="favOnlyCheck"/>
        <span>⭐ Alleen favorieten</span>
      </label>
      <label class="toggle-pill" style="margin-left:8px">
        <input type="checkbox" id="hideDoneRandom"/>
        <span>🙈 Verberg gedaan</span>
      </label>
    </div>

    <div class="random-filters">
      <div class="multi-select-wrap" id="randomFilterCategoryWrap">
        <button class="multi-select-btn" onclick="toggleDropdown('randomFilterCategoryDrop')">
          <span id="randomFilterCategoryLabel">📂 Alle categorieën</span>
          <span class="drop-arrow">▾</span>
        </button>
        <div class="multi-select-drop hidden" id="randomFilterCategoryDrop">
          <label class="drop-option"><input type="checkbox" value="Buiten" class="rand-cat"/> 🌿 Buiten</label>
          <label class="drop-option"><input type="checkbox" value="Thuis" class="rand-cat"/> 🏠 Thuis</label>
          <label class="drop-option"><input type="checkbox" value="Eten" class="rand-cat"/> 🍽️ Eten</label>
          <label class="drop-option"><input type="checkbox" value="Avontuur" class="rand-cat"/> ⚡ Avontuur</label>
        </div>
      </div>

      <div class="multi-select-wrap" id="randomFilterBudgetWrap">
        <button class="multi-select-btn" onclick="toggleDropdown('randomFilterBudgetDrop')">
          <span id="randomFilterBudgetLabel">💸 Alle budgetten</span>
          <span class="drop-arrow">▾</span>
        </button>
        <div class="multi-select-drop hidden" id="randomFilterBudgetDrop">
          <label class="drop-option"><input type="checkbox" value="Gratis" class="rand-budget"/> 🆓 Gratis</label>
          <label class="drop-option"><input type="checkbox" value="Goedkoop" class="rand-budget"/> 💚 Goedkoop</label>
          <label class="drop-option"><input type="checkbox" value="Gemiddeld" class="rand-budget"/> 💛 Gemiddeld</label>
          <label class="drop-option"><input type="checkbox" value="Duur" class="rand-budget"/> ❤️ Duur</label>
        </div>
      </div>

      <div class="multi-select-wrap" id="randomFilterLocWrap">
        <button class="multi-select-btn" onclick="toggleDropdown('randomFilterLocDrop')">
          <span id="randomFilterLocLabel">📍 Alle locaties</span>
          <span class="drop-arrow">▾</span>
        </button>
        <div class="multi-select-drop hidden" id="randomFilterLocDrop">
          <label class="drop-option"><input type="checkbox" value="Nijmegen" class="rand-loc"/> 🏙️ Nijmegen</label>
          <label class="drop-option"><input type="checkbox" value="Amsterdam" class="rand-loc"/> 🏙️ Amsterdam</label>
          <label class="drop-option"><input type="checkbox" value="Rotterdam" class="rand-loc"/> 🏙️ Rotterdam</label>
          <label class="drop-option"><input type="checkbox" value="Overig" class="rand-loc"/> 🗺️ Overig</label>
        </div>
      </div>

      <div class="multi-select-wrap" id="randomFilterDurWrap">
        <button class="multi-select-btn" onclick="toggleDropdown('randomFilterDurDrop')">
          <span id="randomFilterDurLabel">⏱️ Alle tijdsduren</span>
          <span class="drop-arrow">▾</span>
        </button>
        <div class="multi-select-drop hidden" id="randomFilterDurDrop">
          <label class="drop-option"><input type="checkbox" value="Minder dan 2 uur" class="rand-dur"/> ⚡ Minder dan 2 uur</label>
          <label class="drop-option"><input type="checkbox" value="Dagdeel" class="rand-dur"/> 🌤️ Dagdeel</label>
          <label class="drop-option"><input type="checkbox" value="Hele dag" class="rand-dur"/> ☀️ Hele dag</label>
          <label class="drop-option"><input type="checkbox" value="Meerdere dagen" class="rand-dur"/> 🌙 Meerdere dagen</label>
        </div>
      </div>
    </div>

    <button class="primaryBtn shake-btn" id="generateBtn">
      <span class="btn-icon">✨</span> Zoek date
    </button>

    <div id="randomCard" class="resultCard hidden">
      <div class="result-inner">
        <div id="randomTitle" class="resultTitle"></div>
        <div id="randomDescription" class="resultDesc"></div>
        <div class="result-meta">
          <span id="randomCategory" class="badge badge-cat"></span>
          <span id="randomBudget" class="badge badge-budget"></span>
          <span id="randomLocation" class="badge badge-loc"></span>
          <span id="randomDuration" class="badge badge-dur"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD / EDIT -->
  <div class="card" id="addSection">
    <div class="toggle card-header" id="toggleAdd">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="card-icon">➕</span>
        <h2 id="addTitle">Voeg date toe</h2>
      </div>
      <span class="chevron" id="chevronAdd">▼</span>
    </div>

    <div id="addBox" class="collapsible">
      <div class="form-inner">
        <input id="title" placeholder="Titel bijv. Sterren kijken 🌙"/>
        <input id="description" placeholder="Beschrijving..."/>

        <div class="row-inputs">
          <select id="category">
            <option value="">📂 Categorie</option>
            <option value="Buiten">🌿 Buiten</option>
            <option value="Thuis">🏠 Thuis</option>
            <option value="Eten">🍽️ Eten</option>
            <option value="Avontuur">⚡ Avontuur</option>
          </select>

          <select id="budget">
            <option value="">💸 Budget</option>
            <option value="Gratis">🆓 Gratis</option>
            <option value="Goedkoop">💚 Goedkoop</option>
            <option value="Gemiddeld">💛 Gemiddeld</option>
            <option value="Duur">❤️ Duur</option>
          </select>
        </div>

        <div class="row-inputs">
          <select id="location">
            <option value="">📍 Locatie</option>
            <option value="Nijmegen">🏙️ Nijmegen</option>
            <option value="Amsterdam">🏙️ Amsterdam</option>
            <option value="Rotterdam">🏙️ Rotterdam</option>
            <option value="Overig">🗺️ Overig</option>
          </select>

          <select id="duration">
            <option value="">⏱️ Tijdsduur</option>
            <option value="Minder dan 2 uur">⚡ Minder dan 2 uur</option>
            <option value="Dagdeel">🌤️ Dagdeel</option>
            <option value="Hele dag">☀️ Hele dag</option>
            <option value="Meerdere dagen">🌙 Meerdere dagen</option>
          </select>
        </div>

        <div class="form-actions">
          <button class="secondaryBtn" id="cancelBtn">Annuleer</button>
          <button class="primaryBtn" id="addBtn">
            <span id="addBtnLabel">💾 Opslaan</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- FILTER + IDEAS -->
  <div class="card" id="ideasSection">
    <div class="toggle card-header" id="toggleIdeas">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="card-icon">💖</span>
        <h2>Jouw ideeën <span class="count-badge" id="ideaCount">0</span></h2>
      </div>
      <span class="chevron" id="chevronIdeas">▼</span>
    </div>

    <div id="ideasBox" class="collapsible">

      <!-- TABS -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="ideas" onclick="switchTab('ideas')">💖 Ideeën</button>
        <button class="tab-btn" data-tab="done" onclick="switchTab('done')">✅ Gedaan <span class="count-badge" id="doneCount" style="background:linear-gradient(135deg,#60c080,#3a9a5a)">0</span></button>
      </div>

      <!-- IDEAS TAB CONTENT -->
      <div id="tab-ideas">
      <div class="filter-bar">
        <input id="searchInput" placeholder="🔍 Zoeken..." class="search-input"/>
        <div class="pill-row">
          <label class="toggle-pill">
            <input type="checkbox" id="favOnlyIdeas"/>
            <span>⭐ Alleen favorieten</span>
          </label>
          <label class="toggle-pill hide-done-pill">
            <input type="checkbox" id="hideDoneCheck"/>
            <span>🙈 Verberg gedaan</span>
          </label>
        </div>

        <div class="filter-row">
          <!-- Multi-select categorie -->
          <div class="multi-select-wrap">
            <button class="multi-select-btn" onclick="toggleDropdown('filterCatDrop')">
              <span id="filterCatLabel">📂 Categorieën</span>
              <span class="drop-arrow">▾</span>
            </button>
            <div class="multi-select-drop hidden" id="filterCatDrop">
              <label class="drop-option"><input type="checkbox" value="Buiten" class="filt-cat"/> 🌿 Buiten</label>
              <label class="drop-option"><input type="checkbox" value="Thuis" class="filt-cat"/> 🏠 Thuis</label>
              <label class="drop-option"><input type="checkbox" value="Eten" class="filt-cat"/> 🍽️ Eten</label>
              <label class="drop-option"><input type="checkbox" value="Avontuur" class="filt-cat"/> ⚡ Avontuur</label>
            </div>
          </div>

          <!-- Multi-select budget -->
          <div class="multi-select-wrap">
            <button class="multi-select-btn" onclick="toggleDropdown('filterBudgetDrop')">
              <span id="filterBudgetLabel">💸 Budget</span>
              <span class="drop-arrow">▾</span>
            </button>
            <div class="multi-select-drop hidden" id="filterBudgetDrop">
              <label class="drop-option"><input type="checkbox" value="Gratis" class="filt-budget"/> 🆓 Gratis</label>
              <label class="drop-option"><input type="checkbox" value="Goedkoop" class="filt-budget"/> 💚 Goedkoop</label>
              <label class="drop-option"><input type="checkbox" value="Gemiddeld" class="filt-budget"/> 💛 Gemiddeld</label>
              <label class="drop-option"><input type="checkbox" value="Duur" class="filt-budget"/> ❤️ Duur</label>
            </div>
          </div>

          <!-- Multi-select locatie -->
          <div class="multi-select-wrap">
            <button class="multi-select-btn" onclick="toggleDropdown('filterLocDrop')">
              <span id="filterLocLabel">📍 Locatie</span>
              <span class="drop-arrow">▾</span>
            </button>
            <div class="multi-select-drop hidden" id="filterLocDrop">
              <label class="drop-option"><input type="checkbox" value="Nijmegen" class="filt-loc"/> 🏙️ Nijmegen</label>
              <label class="drop-option"><input type="checkbox" value="Amsterdam" class="filt-loc"/> 🏙️ Amsterdam</label>
              <label class="drop-option"><input type="checkbox" value="Rotterdam" class="filt-loc"/> 🏙️ Rotterdam</label>
              <label class="drop-option"><input type="checkbox" value="Overig" class="filt-loc"/> 🗺️ Overig</label>
            </div>
          </div>

          <!-- Multi-select tijdsduur -->
          <div class="multi-select-wrap">
            <button class="multi-select-btn" onclick="toggleDropdown('filterDurDrop')">
              <span id="filterDurLabel">⏱️ Tijdsduur</span>
              <span class="drop-arrow">▾</span>
            </button>
            <div class="multi-select-drop hidden" id="filterDurDrop">
              <label class="drop-option"><input type="checkbox" value="Minder dan 2 uur" class="filt-dur"/> ⚡ Minder dan 2 uur</label>
              <label class="drop-option"><input type="checkbox" value="Dagdeel" class="filt-dur"/> 🌤️ Dagdeel</label>
              <label class="drop-option"><input type="checkbox" value="Hele dag" class="filt-dur"/> ☀️ Hele dag</label>
              <label class="drop-option"><input type="checkbox" value="Meerdere dagen" class="filt-dur"/> 🌙 Meerdere dagen</label>
            </div>
          </div>
        </div>

        <!-- Active filter chips -->
        <div id="activeFilters" class="active-filters hidden"></div>
      </div>

      <ul id="dateList"></ul>
      </div><!-- end tab-ideas -->

      <!-- DONE TAB CONTENT -->
      <div id="tab-done" class="hidden">
        <div class="done-header">
          <p class="done-subtitle">🎉 Jullie hebben dit al gedaan!</p>
        </div>
        <ul id="doneList"></ul>
      </div>

    </div>
  </div>

</div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div id="confirmModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <p>Weet je zeker dat je dit idee wil verwijderen?</p>
    <div class="modal-actions">
      <button class="secondaryBtn" id="cancelDelete">Nee, bewaar</button>
      <button class="primaryBtn danger" id="confirmDelete">Ja, verwijder</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- PASSWORD MODAL -->
<div id="pwModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-icon">🔒</div>
    <p id="pwLabel">Voer het wachtwoord in</p>
    <input
      id="pwInput"
      type="password"
      placeholder="Wachtwoord..."
      autocomplete="current-password"
      style="width:100%;padding:10px 14px;border-radius:12px;border:2px solid #e8a0b0;font-size:1rem;font-family:inherit;margin-top:4px;outline:none;"
    />
    <p id="pwError" class="hidden" style="color:#c0394a;font-size:0.85rem;margin:6px 0 0;">Onjuist wachtwoord, probeer opnieuw 🙈</p>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="secondaryBtn" id="pwCancel">Annuleer</button>
      <button class="primaryBtn" id="pwOk">🔓 Verder</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
