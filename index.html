<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C💖B</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

  <h1>C💖B</h1>

  <!-- ================= RANDOM (BOVENAAN) ================= -->
  <div class="card">

    <h2>🎲 Random date</h2>

    <select id="filterCategory">
      <option value="">Alle categorieën</option>
      <option value="Buiten">Buiten</option>
      <option value="Thuis">Thuis</option>
      <option value="Eten">Eten</option>
      <option value="Avontuur">Avontuur</option>
    </select>

    <select id="filterBudget">
      <option value="">Alle budgetten</option>
      <option value="Gratis">Gratis</option>
      <option value="Goedkoop">Goedkoop</option>
      <option value="Gemiddeld">Gemiddeld</option>
      <option value="Duur">Duur</option>
    </select>

    <button id="generateBtn">🎉 Kies random date</button>

    <div id="randomCard" class="card-result hidden">
      <h3 id="randomTitle"></h3>
      <p id="randomDescription"></p>
    </div>

  </div>

  <!-- ================= ADD IDEA (INKLAPBAAR) ================= -->
  <div class="card">

    <h2 id="toggleAdd" class="toggle-header">
      ➕ Voeg date idee toe <span id="arrowAdd">▼</span>
    </h2>

    <div id="addContent" class="collapsed">

      <input id="title" placeholder="Titel"/>
      <input id="description" placeholder="Beschrijving"/>

      <select id="category">
        <option value="">Categorie</option>
        <option value="Buiten">Buiten</option>
        <option value="Thuis">Thuis</option>
        <option value="Eten">Eten</option>
        <option value="Avontuur">Avontuur</option>
      </select>

      <select id="budget">
        <option value="">Budget</option>
        <option value="Gratis">Gratis</option>
        <option value="Goedkoop">Goedkoop</option>
        <option value="Gemiddeld">Gemiddeld</option>
        <option value="Duur">Duur</option>
      </select>

      <button id="addBtn">➕ Toevoegen</button>

    </div>
  </div>

  <!-- ================= YOUR IDEAS ================= -->
  <div class="card">

    <h2 id="toggleIdeas" class="toggle-header">
      💖 Jouw ideeën <span id="arrowIdeas">▼</span>
    </h2>

    <div id="ideasContent" class="collapsed">
      <ul id="dateList"></ul>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
