<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>💖 Date App</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

  <h1>💖 Date Generator</h1>

<!-- RANDOM -->
<div class="card glass">
  <h2>🎲 Random date</h2>

  <select id="filterCategory">
    <option value="">Alle categorieën</option>
    <option value="Buiten">Buiten</option>
    <option value="Thuis">Thuis</option>
    <option value="Eten">Eten</option>
    <option value="Avontuur">Avontuur</option>
  </select>

  <select id="filterBudget">
    <option value="">Alle budgetten</option>
    <option value="Gratis">Gratis</option>
    <option value="Goedkoop">Goedkoop</option>
    <option value="Gemiddeld">Gemiddeld</option>
    <option value="Duur">Duur</option>
  </select>

  <button class="primaryBtn" id="generateBtn">✨ Verras me</button>

  <!-- NEW OUTPUT CARD -->
  <div id="randomCard" class="resultCard hidden">
    <div class="resultTitle" id="randomTitle"></div>
    <div class="resultDesc" id="randomDescription"></div>
  </div>
</div>

  <!-- ADD -->
  <div class="card glass">

    <div class="toggle" id="toggleAdd">
      <h2>➕ Voeg date toe</h2>
      <span>▼</span>
    </div>

    <div id="addBox" class="collapsible">

      <input id="title" placeholder="Titel"/>
      <input id="description" placeholder="Beschrijving"/>

      <select id="category">
        <option value="">Categorie</option>
        <option value="Buiten">Buiten</option>
        <option value="Thuis">Thuis</option>
        <option value="Eten">Eten</option>
        <option value="Avontuur">Avontuur</option>
      </select>

      <select id="budget">
        <option value="">Budget</option>
        <option value="Gratis">Gratis</option>
        <option value="Goedkoop">Goedkoop</option>
        <option value="Gemiddeld">Gemiddeld</option>
        <option value="Duur">Duur</option>
      </select>

      <button id="addBtn">Toevoegen</button>

    </div>
  </div>

  <!-- IDEAS -->
  <div class="card glass">

    <div class="toggle" id="toggleIdeas">
      <h2>💖 Jouw ideeën</h2>
      <span>▼</span>
    </div>

    <div id="ideasBox" class="collapsible">
      <ul id="dateList"></ul>
    </div>

  </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
